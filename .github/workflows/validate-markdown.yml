name: Validate Markdown

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/validate-markdown.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/validate-markdown.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19